  <body>
    <!-- Loading Screen -->
    <div id="loading" style="
      position: fixed;
      inset: 0;
      background-color: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    ">
      <div style="
        font-family: serif;
        font-size: 1.5rem;
        color: #c9a84c;
        letter-spacing: 2px;
        text-align: center;
      ">
        FocusAfter35
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.addEventListener('load', function() {
        const loadingScreen = document.getElementById('loading');
        if (loadingScreen) {
          loadingScreen.style.display = 'none';
        }
      });
      
      // Script to ensure any platform-injected branding badges are removed
      (function() {
        const removeBranding = () => {
          const selectors = [
            '.horizons-badge', 
            '.hostinger-badge', 
            '[id*="hostinger"]', 
            '[class*="hostinger-badge"]',
            '[class*="horizons-badge"]',
            'a[href*="hostinger.com/horizons"]'
          ];
          selectors.forEach(sel => {
            document.querySelectorAll(sel).forEach(el => {
              if (el) {
                el.style.display = 'none';
                el.remove();
              }
            });
          });
        };
        
        // Run immediately, on load, and observe DOM for delayed dynamic injections
        removeBranding();
        window.addEventListener('DOMContentLoaded', removeBranding);
        window.addEventListener('load', removeBranding);
        setTimeout(removeBranding, 1000);
        setTimeout(removeBranding, 3000);
        
        const observer = new MutationObserver(() => {
          removeBranding();
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
